<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <title>Minecraft Chat</title>
        <meta
            name="viewport"
            content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover, interactive-widget=resizes-content"
        />
        <link
            rel="icon"
            type="image/png"
            sizes="32x32"
            href="img/icon_32.png"
        />
        <link
            rel="icon"
            type="image/png"
            sizes="16x16"
            href="img/icon_16.png"
        />
        <link rel="apple-touch-icon" sizes="180x180" href="img/icon_180.png" />
        <link rel="manifest" href="site.webmanifest" />
        <link rel="stylesheet" href="css/jetbrains_mono.css" />
        <link rel="stylesheet" href="css/main.css" />
        <link rel="stylesheet" href="css/message_formatting.css" />
    </head>
    <body>
        <div id="modal-container" aria-hidden="true">
            <div id="modal-content">
                <div id="modal-text">
                    <p>Are you sure you want to open the following website?</p>
                    <p class="modal-url"></p>
                    <p>Never open links from people you don't trust!</p>
                </div>
                <div class="modal-buttons">
                    <button id="modal-confirm">Yes</button>
                    <button id="modal-copy">Copy to Clipboard</button>
                    <button id="modal-cancel">No</button>
                </div>
            </div>
        </div>
        <div id="mod-modal-container" aria-hidden="true">
            <div id="mod-modal-content">
                <div id="mod-modal-text">
                    <h3 id="mod-modal-title" style="margin: 0; margin-bottom: 0.5rem;">Moderation Action</h3>
                </div>
                <div class="mod-modal-inputs">
                    <input type="text" id="mod-modal-duration" placeholder="Duration (e.g., 10d) [Optional for Kick]" aria-label="Duration" />
                    <input type="text" id="mod-modal-reason" placeholder="Reason (e.g., Spam)" aria-label="Reason" />
                </div>
                <div class="modal-buttons">
                    <button id="mod-modal-submit">Submit</button>
                    <button id="mod-modal-cancel">Cancel</button>
                </div>
            </div>
        </div>
        <div id="hover-container" aria-hidden="true"></div>

        <main id="container">
            <section id="chat-area" aria-label="Chat messages and input">
                <div id="tab-list" aria-label="Tab completion list">
                    <ul></ul>
                </div>
                <section
                    id="messages"
                    role="log"
                    aria-live="polite"
                    aria-label="Chat messages"
                >
                    <div id="history-loader" aria-label="Loading messages">
                        <div class="message-placeholder">
                            <div class="placeholder-time"></div>
                            <div
                                class="placeholder-content"
                                style="width: 15%"
                            ></div>
                        </div>
                        <div class="message-placeholder">
                            <div class="placeholder-time"></div>
                            <div
                                class="placeholder-content"
                                style="width: 25%"
                            ></div>
                        </div>
                        <div class="message-placeholder">
                            <div class="placeholder-time"></div>
                            <div
                                class="placeholder-content"
                                style="width: 15%"
                            ></div>
                        </div>
                        <div class="message-placeholder">
                            <div class="placeholder-time"></div>
                            <div
                                class="placeholder-content"
                                style="width: 25%"
                            ></div>
                        </div>
                        <div class="message-placeholder">
                            <div class="placeholder-time"></div>
                            <div
                                class="placeholder-content"
                                style="width: 30%"
                            ></div>
                        </div>
                        <div class="message-placeholder">
                            <div class="placeholder-time"></div>
                            <div
                                class="placeholder-content"
                                style="width: 15%"
                            ></div>
                        </div>
                    </div>
                </section>
                <button id="skip-to-present">Skip to Present</button>
                <section id="input-area" aria-label="Message input">
                    <div id="input-alert" aria-hidden="true">
                        <span></span>
                    </div>
                    <div id="message-input-container">
                        <img
                            id="direct-message-clear"
                            src="img/heroicons/x-mark.svg"
                            aria-label="Clear recipient"
                        />
                        <textarea
                            id="message-input"
                            placeholder="Type your message..."
                            rows="1"
                            aria-label="Type a chat message"
                            aria-invalid="false"
                        ></textarea>
                        <img
                            id="message-send-button"
                            src="img/heroicons/paper-airplane.svg"
                            aria-label="Send message"
                        />
                    </div>
                </section>
            </section>
            <aside id="player-list-container" aria-label="Online players">
                <h2>
                    Players Online
                    <span id="player-count" aria-live="polite">(0)</span>
                </h2>
                <ul id="player-list"></ul>
            </aside>
        </main>
        <div id="status-container">
            <div
                id="status"
                role="status"
                data-status="disconnected"
                aria-live="polite"
            >
                Disconnected from Minecraft
            </div>
            <img
                id="sidebar-toggle"
                src="img/heroicons/bars-3.svg"
                aria-label="Open sidebar"
            />
        </div>

        <script type="module" src="js/chat.mjs"></script>
    </body>
</html>
